name: Cleanup old deployments

on:
  deployment_status:

jobs:
  cleanup-github:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    permissions:
      deployments: write

    steps:
      - name: Delete old GitHub deployments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Prendi tutti i deployment, ordina per data desc, salta il primo (più recente)
          gh api repos/${{ github.repository }}/deployments --paginate \
            --jq 'sort_by(.created_at) | reverse | .[1:] | .[].id' | while read id; do
            # Marca inactive (obbligatorio prima del delete)
            gh api repos/${{ github.repository }}/deployments/$id/statuses \
              -X POST -f state=inactive 2>/dev/null || true
            # Elimina
            gh api repos/${{ github.repository }}/deployments/$id \
              -X DELETE 2>/dev/null && echo "Deleted deployment $id" || true
          done

  cleanup-vercel:
    if: github.event.deployment_status.state == 'success' && secrets.VERCEL_TOKEN != ''
    runs-on: ubuntu-latest
    steps:
      - name: Delete old Vercel deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PROJECT_ID="prj_uBinjWLGdqMZuqFmdR75ZSqycbZ5"

          DEPLOYMENTS=$(curl -s "https://api.vercel.com/v6/deployments?projectId=$PROJECT_ID&limit=100" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.deployments | sort_by(.createdAt) | reverse | .[1:] | .[].uid')

          for UID in $DEPLOYMENTS; do
            curl -s -X DELETE "https://api.vercel.com/v13/deployments/$UID" \
              -H "Authorization: Bearer $VERCEL_TOKEN" > /dev/null
            echo "Deleted Vercel deployment $UID"
          done