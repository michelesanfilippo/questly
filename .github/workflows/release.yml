name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag -l "v1.0.*" | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            PATCH=$(echo $LATEST | sed 's/v1\.0\.//')
            NEXT="v1.0.$((PATCH + 1))"
          fi
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT"

      - name: Delete all previous releases and tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/releases \
            --jq '.[].id' | while read id; do
            gh api repos/${{ github.repository }}/releases/$id -X DELETE
            echo "Deleted release $id"
          done
          git tag -l "v*" | while read tag; do
            git push origin :refs/tags/$tag 2>/dev/null || true
            echo "Deleted tag $tag"
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEXT
          git push origin $NEXT
          gh release create $NEXT --title "Release $NEXT" --generate-notes
          echo "Created release $NEXT"